<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪闪-pika 的歌单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 顶部波浪 -->
    <div class="wave-top">
        <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
            <path class="wave-path" d="M0,64 C240,160 480,0 720,64 C960,128 1200,32 1440,96 L1440,0 L0,0 Z"></path>
            <path class="wave-path wave-path-2" d="M0,96 C320,32 560,128 720,96 C880,64 1200,160 1440,64 L1440,0 L0,0 Z"></path>
        </svg>
    </div>

    <!-- 主内容 -->
    <div class="container main-container">
        <!-- 头部 -->
        <header class="hero text-center">
            <div class="avatar-container">
                <div class="avatar">
                    <span class="avatar-text">✨</span>
                </div>
            </div>
            <h1 class="hero-title">闪闪-pika</h1>
            <p class="hero-subtitle">✨ 歌单精选 ✨</p>
            <div class="hero-decorations">
                <span class="bubble b1"></span>
                <span class="bubble b2"></span>
                <span class="bubble b3"></span>
                <span class="shell">🐚</span>
                <span class="starfish">⭐</span>
            </div>
        </header>

        <!-- Bilibili 链接 -->
        <div class="bilibili-links">
            <a href="https://space.bilibili.com/3546928222571136" target="_blank" rel="noopener" class="bili-link bili-space">
                <i class="bi bi-house-heart-fill"></i>
                <span>闪闪-pika 的主页</span>
            </a>
            <a href="https://live.bilibili.com/1861308619" target="_blank" rel="noopener" class="bili-link bili-live">
                <i class="bi bi-broadcast"></i>
                <span>闪闪-pika 的直播间</span>
            </a>
        </div>

        <!-- 切换按钮 -->
        <div class="toggle-bar">
            <button class="toggle-btn active" data-type="skilled">
                <span class="toggle-icon">🎤</span>
                <span>拿手歌单</span>
            </button>
            <button class="toggle-btn" data-type="learning">
                <span class="toggle-icon">📖</span>
                <span>在学歌单</span>
            </button>
            <button class="refresh-btn" id="refresh-btn" title="强制刷新歌单（清除缓存）">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>

        <!-- 歌单卡片 - 翻页容器 -->
        <div class="flip-container" id="flip-container">
            <div class="playlist-card" id="playlist-card">
                <div class="card-inner">
                    <div class="card-header-custom" id="card-header">
                        <div class="card-icon" id="card-icon">📖</div>
                        <div>
                            <h2 class="card-title" id="card-title">在学歌单</h2>
                            <p class="card-desc" id="card-desc">正在练习中的歌曲</p>
                        </div>
                        <div class="card-source" id="card-source"></div>
                    </div>
                    <div class="card-body-custom">
                        <div class="loading-spinner" id="playlist-loading">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                            <p class="loading-text">正在拉取歌单...</p>
                        </div>
                        <div class="track-count" id="track-count"></div>
                        <div class="track-list" id="track-list"></div>
                        <div class="error-msg" id="error-msg" style="display:none;">
                            <i class="bi bi-exclamation-triangle"></i> 加载失败，请刷新重试
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <footer class="text-center mt-4">
            <p class="footer-text">Powered by <i class="bi bi-spotify"></i> 网易云音乐 | 闪闪-pika © 2026</p>
        </footer>
    </div>

    <!-- 底部波浪 -->
    <div class="wave-bottom">
        <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
            <path class="wave-path" d="M0,136 C240,40 480,200 720,136 C960,72 1200,168 1440,104 L1440,200 L0,200 Z"></path>
            <path class="wave-path wave-path-2" d="M0,104 C320,168 560,72 720,104 C880,136 1200,40 1440,136 L1440,200 L0,200 Z"></path>
        </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
